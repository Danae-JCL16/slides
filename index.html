<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Portafolio de Presentaciones</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #e5e7eb;

      /* degradado más suave y moderno */
      background: radial-gradient(circle at top, #3b0764 0%,
    #1e1b4b 40%,
    #0f0a1f 75%,
    #05010a 100%);
      min-height: 100vh;
    }

    header {
      padding: 60px 20px 30px;
      text-align: center;
    }

    h1 {
      font-size: 2.6em;
      margin: 0;
      letter-spacing: 1px;
      color: #f5f3ff;
      text-shadow: 0 0 15px rgba(168, 85, 247, 0.25);
    }

    .subtitle {
      margin-top: 10px;
      color: #c4b5fd;
      font-size: 1.1em;
    }

    .container {
      max-width: 850px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(168, 85, 247, 0.2);
      padding: 20px;
      margin: 18px 0;
      border-radius: 16px;
      backdrop-filter: blur(12px);

      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      background: rgba(168, 85, 247, 0.08);
      box-shadow: 0 10px 30px rgba(88, 28, 135, 0.35);
    }

    .card h2 {
      margin: 0 0 5px;
      color: #f5f3ff;
    }

    .card p {
      margin: 0 0 10px;
      color: #d6d3ff;
    }

    a {
      color: #c084fc;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      color: #e9d5ff;
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      margin-top: 50px;
      color: ##a1a1aa;
      font-size: 0.9em;
      padding-bottom: 30px;
    }
  </style>
</head>

<body>

<header>
  <h1>📁 Portafolio de Presentaciones</h1>
  <div class="subtitle">
    Procesamiento de Datos en la Nube · Danae Joceline Cortes López · 230300986
  </div>
</header>

<div class="container">

  <div class="card">
    <h2>Tarea #996</h2>
    <p>Virtualización en TIC</p>
    <a href="tarea-996.html">Ver presentación →</a>
  </div>

  <div class="card">
    <h2>Tarea #997</h2>
    <p>Pizza as a Service 2.0</p>
    <a href="tarea-997.html">Ver presentación →</a>
  </div>

</div>

<div class="footer">
  Universidad del Caribe <br>
  Danae Joceline Cortes López
</div>

</body>
</html>
